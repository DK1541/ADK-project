# ============================================================
# docker-compose.yml — ADK Assistant local deployment
# ============================================================
# Start:  docker compose up
# Stop:   docker compose down
#
# Chat UI  → http://localhost:8000/
# API docs → http://localhost:8000/docs
# ============================================================

services:

  assistant:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist SQLite session DB across container restarts
      - ./data:/app/data
    restart: unless-stopped
