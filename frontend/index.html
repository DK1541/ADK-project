<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADK Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3d;
      --accent:    #6c63ff;
      --accent-lt: #8b85ff;
      --user-bg:   #6c63ff;
      --agent-bg:  #1e2130;
      --text:      #e2e4ed;
      --muted:     #6b7280;
      --danger:    #ef4444;
      --radius:    14px;
      --sidebar:   240px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    .logo {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 16px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }

    header h1 { font-size: 16px; font-weight: 600; flex: 1; }

    .header-badge {
      font-size: 12px;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
    }

    .icon-btn {
      width: 34px; height: 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent; color: var(--text);
      font-size: 16px; cursor: pointer;
      display: grid; place-items: center;
      transition: background .15s;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--border); }

    /* ── Body: sidebar + chat ── */
    .body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: width .2s, opacity .2s;
      overflow: hidden;
    }

    #sidebar.collapsed { width: 0; opacity: 0; }

    .sidebar-header {
      padding: 12px 14px 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .clear-all-btn {
      font-size: 11px;
      color: var(--muted);
      background: none; border: none; cursor: pointer;
      padding: 2px 6px; border-radius: 4px;
    }
    .clear-all-btn:hover { color: var(--danger); background: #2a1515; }

    #history-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    #history-list::-webkit-scrollbar { width: 3px; }
    #history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .history-empty {
      padding: 24px 14px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .history-item {
      padding: 9px 14px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .12s, border-color .12s;
      position: relative;
    }
    .history-item:hover { background: var(--bg); }
    .history-item.active {
      background: var(--bg);
      border-left-color: var(--accent);
    }

    .history-title {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 20px;
    }

    .history-meta {
      display: flex; gap: 6px; align-items: center;
      margin-top: 3px;
    }

    .history-time {
      font-size: 10px;
      color: var(--muted);
    }

    .delete-btn {
      position: absolute;
      right: 8px; top: 50%;
      transform: translateY(-50%);
      width: 20px; height: 20px;
      border-radius: 4px;
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 14px;
      display: none; place-items: center;
    }
    .history-item:hover .delete-btn { display: grid; }
    .delete-btn:hover { color: var(--danger); background: #2a1515; }

    /* ── Main column ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Messages ── */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 75%;
      animation: fadeUp .2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg.agent { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: grid; place-items: center;
      font-size: 14px; font-weight: 700;
    }

    .msg.user  .avatar { background: var(--user-bg); color: #fff; }
    .msg.agent .avatar { background: var(--agent-bg); border: 1px solid var(--border); }

    .bubble {
      padding: 11px 15px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user  .bubble { background: var(--user-bg); color: #fff; border-bottom-right-radius: 4px; }
    .msg.agent .bubble { background: var(--agent-bg); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; }
    .msg.error .bubble { background: #2a1515; border-color: var(--danger); color: #fca5a5; }

    /* ── Typing indicator ── */
    .typing .bubble { display: flex; gap: 5px; align-items: center; padding: 14px 16px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* ── Welcome screen ── */
    #welcome {
      margin: auto;
      text-align: center;
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
    }
    #welcome .icon { width: 64px; height: 64px; background: var(--accent); border-radius: 16px; display: grid; place-items: center; font-size: 28px; }
    #welcome h2 { font-size: 22px; font-weight: 600; }
    #welcome p  { color: var(--muted); font-size: 14px; max-width: 380px; line-height: 1.6; }

    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
    .suggestion {
      padding: 8px 14px; border: 1px solid var(--border); border-radius: 20px;
      font-size: 13px; color: var(--text); cursor: pointer; background: var(--surface); transition: all .15s;
    }
    .suggestion:hover { border-color: var(--accent); color: var(--accent-lt); }

    /* ── Input bar ── */
    #input-bar { padding: 16px 20px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }

    .input-row {
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px; transition: border-color .15s;
    }
    .input-row:focus-within { border-color: var(--accent); }

    #user-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-size: 14px; resize: none; max-height: 140px;
      line-height: 1.5; font-family: inherit;
    }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 34px; height: 34px; border-radius: 8px; border: none; cursor: pointer;
      background: var(--accent); color: #fff; display: grid; place-items: center;
      flex-shrink: 0; transition: background .15s, opacity .15s;
    }
    #send-btn:hover   { background: var(--accent-lt); }
    #send-btn:disabled { opacity: .4; cursor: default; }
    #send-btn svg { width: 16px; height: 16px; }

    /* ── Status bar ── */
    #status-bar { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); padding: 4px 0 0; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
    .status-dot.ok    { background: #22c55e; }
    .status-dot.error { background: var(--danger); }

    /* ── Attachments ── */
    .attach-btn {
      width: 30px; height: 30px; border-radius: 7px; border: none; cursor: pointer;
      background: transparent; color: var(--muted); font-size: 18px;
      display: grid; place-items: center; flex-shrink: 0; transition: color .15s, background .15s;
      line-height: 1;
    }
    .attach-btn:hover { color: var(--accent); background: var(--border); }

    #attachment-preview {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 0 0 10px;
    }
    #attachment-preview:empty { display: none; }

    .attachment-chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--agent-bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 4px 8px 4px 6px;
      font-size: 12px; color: var(--text); max-width: 200px;
    }

    .attachment-chip img {
      width: 28px; height: 28px; object-fit: cover; border-radius: 4px; flex-shrink: 0;
    }

    .attachment-chip .chip-icon {
      width: 28px; height: 28px; border-radius: 4px;
      background: var(--border); display: grid; place-items: center;
      font-size: 14px; flex-shrink: 0;
    }

    .chip-name {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
    }

    .chip-remove {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 14px; padding: 0 2px; flex-shrink: 0;
      line-height: 1;
    }
    .chip-remove:hover { color: var(--danger); }

    /* Attachment in chat bubble */
    .bubble img { max-width: 260px; max-height: 200px; border-radius: 8px; display: block; margin-bottom: 6px; }
    .bubble .doc-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 5px 10px; font-size: 12px; margin-bottom: 6px;
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <button class="icon-btn" id="toggle-sidebar" title="Toggle history">☰</button>
  <div class="logo">A</div>
  <h1>ADK Assistant</h1>
  <span class="header-badge">6 specialists</span>
  <button class="icon-btn" id="new-chat-btn" title="New chat">✏</button>
</header>

<!-- ── Body ── -->
<div class="body">

  <!-- ── Sidebar ── -->
  <div id="sidebar">
    <div class="sidebar-header">
      Chat History
      <button class="clear-all-btn" id="clear-all-btn">Clear all</button>
    </div>
    <div id="history-list">
      <div class="history-empty">No chats yet.<br>Start a conversation!</div>
    </div>
  </div>

  <!-- ── Main ── -->
  <div class="main">
    <div id="chat">
      <div id="welcome">
        <div class="icon">🤖</div>
        <h2>What can I help with?</h2>
        <p>Powered by six specialist agents: weather &amp; time, travel, math, language, code, and knowledge.</p>
        <div class="suggestions" id="suggestions"></div>
      </div>
    </div>

    <div id="input-bar">
      <div id="attachment-preview"></div>

      <div class="input-row">
        <input type="file" id="file-input" multiple hidden
               accept="image/png,image/jpeg,image/webp,image/gif,image/heic,
                       application/pdf,text/plain,text/markdown,text/csv,
                       .md,.csv,.txt,.pdf" />
        <button class="attach-btn" id="attach-btn" title="Attach image or document">+</button>
        <textarea id="user-input" rows="1" placeholder="Ask anything… (Shift+Enter for new line)"></textarea>
        <button id="send-btn" title="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div id="status-bar">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Connecting…</span>
      </div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// Config
// ─────────────────────────────────────────────
const API     = '';
const APP_NAME = 'assistant';

const SUGGESTIONS = [
  "What's the weather in Chicago?",
  "What time is it in Tokyo right now?",
  "Write a Python function to reverse a linked list.",
  "Translate 'Good morning, how are you?' to Japanese.",
  "What caused World War I?",
  "Convert 150 lbs to kg.",
  "Plan a trip to London — what should I see?",
  "Explain the difference between TCP and UDP.",
];

// ─────────────────────────────────────────────
// Persistent state (localStorage)
// ─────────────────────────────────────────────

function getOrCreateUserId() {
  let id = localStorage.getItem('adk_user_id');
  if (!id) { id = 'user_' + Math.random().toString(36).slice(2, 10); localStorage.setItem('adk_user_id', id); }
  return id;
}

const USER_ID = getOrCreateUserId();

function loadHistory() {
  try { return JSON.parse(localStorage.getItem('adk_history') || '[]'); } catch { return []; }
}

function saveHistory(history) {
  localStorage.setItem('adk_history', JSON.stringify(history));
}

function addToHistory(sessionId, title) {
  const history = loadHistory().filter(h => h.sessionId !== sessionId);
  history.unshift({ sessionId, title, timestamp: Date.now() });
  saveHistory(history.slice(0, 100));
  renderHistory();
}

function updateHistoryTitle(sessionId, title) {
  const history = loadHistory();
  const item = history.find(h => h.sessionId === sessionId);
  if (item) { item.title = title; saveHistory(history); renderHistory(); }
}

function deleteFromHistory(sessionId) {
  saveHistory(loadHistory().filter(h => h.sessionId !== sessionId));
  renderHistory();
}

// ─────────────────────────────────────────────
// Runtime state
// ─────────────────────────────────────────────
let sessionId = newSessionId();
let isWaiting = false;

function newSessionId() {
  return 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
}

function relativeTime(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  const h = Math.floor(diff / 3600000);
  const d = Math.floor(diff / 86400000);
  if (m < 1)  return 'just now';
  if (m < 60) return `${m}m ago`;
  if (h < 24) return `${h}h ago`;
  if (d < 7)  return `${d}d ago`;
  return new Date(ts).toLocaleDateString();
}

// ─────────────────────────────────────────────
// DOM refs
// ─────────────────────────────────────────────
const chatEl       = document.getElementById('chat');
const inputEl      = document.getElementById('user-input');
const sendBtn      = document.getElementById('send-btn');
const statusDot    = document.getElementById('status-dot');
const statusText   = document.getElementById('status-text');
const suggestionsEl= document.getElementById('suggestions');
const welcome      = document.getElementById('welcome');
const historyList  = document.getElementById('history-list');
const sidebar      = document.getElementById('sidebar');

// ─────────────────────────────────────────────
// Sidebar toggle
// ─────────────────────────────────────────────
let sidebarOpen = true;

document.getElementById('toggle-sidebar').addEventListener('click', () => {
  sidebarOpen = !sidebarOpen;
  sidebar.classList.toggle('collapsed', !sidebarOpen);
});

// ─────────────────────────────────────────────
// History rendering
// ─────────────────────────────────────────────
function renderHistory() {
  const history = loadHistory();
  if (!history.length) {
    historyList.innerHTML = '<div class="history-empty">No chats yet.<br>Start a conversation!</div>';
    return;
  }

  historyList.innerHTML = history.map(h => `
    <div class="history-item ${h.sessionId === sessionId ? 'active' : ''}"
         data-session="${h.sessionId}">
      <div class="history-title">${escapeHtml(h.title)}</div>
      <div class="history-meta">
        <span class="history-time">${relativeTime(h.timestamp)}</span>
      </div>
      <button class="delete-btn" data-session="${h.sessionId}" title="Delete">✕</button>
    </div>
  `).join('');

  historyList.querySelectorAll('.history-item').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('delete-btn')) return;
      resumeSession(el.dataset.session);
    });
  });

  historyList.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteFromHistory(btn.dataset.session);
      if (btn.dataset.session === sessionId) startNewChat();
    });
  });
}

document.getElementById('clear-all-btn').addEventListener('click', () => {
  if (confirm('Clear all chat history?')) {
    saveHistory([]);
    renderHistory();
    startNewChat();
  }
});

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─────────────────────────────────────────────
// Resume a past session
// ─────────────────────────────────────────────
async function resumeSession(sid) {
  sessionId = sid;
  renderHistory();

  chatEl.innerHTML = '';
  setStatus('', 'Loading history…');

  try {
    const res = await fetch(`${API}/apps/${APP_NAME}/users/${USER_ID}/sessions/${sid}`);
    if (!res.ok) throw new Error(`${res.status}`);
    const data = await res.json();

    const events = data.events || [];
    if (!events.length) {
      chatEl.appendChild(welcome);
      welcome.style.display = 'flex';
      setStatus('ready', 'Session loaded (empty)');
      return;
    }

    for (const event of events) {
      if (!event.content?.parts?.length) continue;
      const text = event.content.parts.map(p => p.text || '').join('').trim();
      if (!text) continue;
      const role = event.content.role === 'user' ? 'user' : 'agent';
      addMessage(role, text);
    }

    setStatus('ready', `Resumed — ${events.length} messages loaded`);
  } catch (err) {
    addMessage('agent', `Could not load session history: ${err.message}`, 'error');
    setStatus('error', 'Failed to load history');
  }
}

// ─────────────────────────────────────────────
// New chat
// ─────────────────────────────────────────────
document.getElementById('new-chat-btn').addEventListener('click', startNewChat);

function startNewChat() {
  sessionId = newSessionId();
  chatEl.innerHTML = '';
  chatEl.appendChild(welcome);
  welcome.style.display = 'flex';
  renderHistory();
  setStatus('ready', 'New session started');
}

// ─────────────────────────────────────────────
// Suggestions
// ─────────────────────────────────────────────
function buildSuggestions() {
  suggestionsEl.innerHTML = '';
  SUGGESTIONS.forEach(s => {
    const chip = document.createElement('button');
    chip.className = 'suggestion';
    chip.textContent = s;
    chip.onclick = () => sendMessage(s);
    suggestionsEl.appendChild(chip);
  });
}

// ─────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────
function setStatus(state, text) {
  statusDot.className = 'status-dot ' + (state === 'ready' ? 'ok' : state === 'error' ? 'error' : '');
  statusText.textContent = text;
}

// ─────────────────────────────────────────────
// Message rendering
// ─────────────────────────────────────────────
function addMessage(role, text, extra = '') {
  if (welcome.parentNode === chatEl) welcome.style.display = 'none';
  const msg    = document.createElement('div');
  msg.className = `msg ${role}${extra ? ' ' + extra : ''}`;
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? 'U' : '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chatEl.appendChild(msg);
  chatEl.scrollTop = chatEl.scrollHeight;
  return bubble;
}

function addTyping() {
  if (welcome.parentNode === chatEl) welcome.style.display = 'none';
  const msg = document.createElement('div');
  msg.className = 'msg agent typing';
  msg.id = 'typing-indicator';
  msg.innerHTML = `<div class="avatar">🤖</div><div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
  chatEl.appendChild(msg);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping() { document.getElementById('typing-indicator')?.remove(); }

// ─────────────────────────────────────────────
// API calls
// ─────────────────────────────────────────────
async function ensureSession() {
  await fetch(`${API}/apps/${APP_NAME}/users/${USER_ID}/sessions/${sessionId}`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}',
  }).catch(() => {});
}

async function sendMessage(text) {
  if (!text.trim() && !pendingFiles.length) return;
  if (isWaiting) return;
  isWaiting = true;
  sendBtn.disabled = true;

  const parts       = buildParts(text);
  const displayText = text.trim() || (pendingFiles.length ? `[${pendingFiles.length} file(s)]` : '');
  const hasFiles    = pendingFiles.length > 0;

  inputEl.value = '';
  autoResize();

  const isFirst = !loadHistory().find(h => h.sessionId === sessionId);

  const userBubble = addMessage('user', displayText);
  if (hasFiles) addAttachmentsToBubble(userBubble);

  clearAttachments();
  addTyping();
  setStatus('', 'Agent is thinking…');

  if (isFirst) addToHistory(sessionId, displayText.slice(0, 60));

  try {
    await ensureSession();
    const res = await fetch(`${API}/run`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        appName: APP_NAME, userId: USER_ID, sessionId,
        newMessage: { role: 'user', parts },
      }),
    });

    removeTyping();

    if (!res.ok) {
      const err = await res.text();
      addMessage('agent', `Error ${res.status}: ${err}`, 'error');
      setStatus('error', `Server error ${res.status}`);
      return;
    }

    const events = await res.json();
    let reply = null;
    for (const event of events) {
      if (event?.content?.parts?.length) {
        const t = event.content.parts.map(p => p.text || '').join('').trim();
        if (t) reply = t;
      }
    }

    if (reply) {
      addMessage('agent', reply);
      setStatus('ready', 'Ready');
    } else {
      addMessage('agent', '[No text response — check server logs]', 'error');
      setStatus('error', 'Empty response');
    }

  } catch (err) {
    removeTyping();
    addMessage('agent', `Could not reach the server.\n\nMake sure server.py is running:\n  python server.py`, 'error');
    setStatus('error', 'Cannot connect to server');
  } finally {
    isWaiting = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

// ─────────────────────────────────────────────
// File attachments
// ─────────────────────────────────────────────

const attachBtn = document.getElementById('attach-btn');
const fileInput = document.getElementById('file-input');
const previewEl = document.getElementById('attachment-preview');

let pendingFiles = [];

const IMAGE_TYPES = ['image/png','image/jpeg','image/webp','image/gif','image/heic','image/heif'];
const TEXT_TYPES  = ['text/plain','text/markdown','text/csv'];

attachBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', async () => {
  for (const file of fileInput.files) {
    if (pendingFiles.length >= 5) { alert('Maximum 5 attachments per message.'); break; }
    await processFile(file);
  }
  fileInput.value = '';
  renderPreviews();
});

document.getElementById('input-bar').addEventListener('dragover', e => {
  e.preventDefault();
  e.currentTarget.style.outline = `2px dashed var(--accent)`;
});
document.getElementById('input-bar').addEventListener('dragleave', e => {
  e.currentTarget.style.outline = '';
});
document.getElementById('input-bar').addEventListener('drop', async e => {
  e.preventDefault();
  e.currentTarget.style.outline = '';
  for (const file of e.dataTransfer.files) {
    if (pendingFiles.length >= 5) break;
    await processFile(file);
  }
  renderPreviews();
});

async function processFile(file) {
  const isImage = IMAGE_TYPES.includes(file.type);
  const isText  = TEXT_TYPES.includes(file.type) || file.name.endsWith('.md');
  const isPDF   = file.type === 'application/pdf';

  if (!isImage && !isText && !isPDF) {
    alert(`Unsupported file type: ${file.type || file.name}`);
    return;
  }

  if (isText) {
    const textContent = await file.text();
    pendingFiles.push({ name: file.name, mimeType: file.type || 'text/plain', isText: true, textContent });
  } else {
    const base64 = await toBase64(file);
    const objectUrl = isImage ? URL.createObjectURL(file) : null;
    pendingFiles.push({ name: file.name, mimeType: file.type, isText: false, data: base64, objectUrl });
  }
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function renderPreviews() {
  previewEl.innerHTML = '';
  pendingFiles.forEach((f, i) => {
    const chip = document.createElement('div');
    chip.className = 'attachment-chip';

    if (f.objectUrl) {
      chip.innerHTML = `<img src="${f.objectUrl}" alt="${f.name}" />`;
    } else {
      const icon = f.mimeType === 'application/pdf' ? '📄' : '📝';
      chip.innerHTML = `<span class="chip-icon">${icon}</span>`;
    }

    chip.innerHTML += `
      <span class="chip-name" title="${escapeHtml(f.name)}">${escapeHtml(f.name)}</span>
      <button class="chip-remove" data-index="${i}" title="Remove">✕</button>`;

    previewEl.appendChild(chip);
  });

  previewEl.querySelectorAll('.chip-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = +btn.dataset.index;
      if (pendingFiles[idx]?.objectUrl) URL.revokeObjectURL(pendingFiles[idx].objectUrl);
      pendingFiles.splice(idx, 1);
      renderPreviews();
    });
  });
}

function buildParts(text) {
  const parts = [];
  pendingFiles.filter(f => f.isText).forEach(f => {
    parts.push({ text: `[File: ${f.name}]\n\`\`\`\n${f.textContent}\n\`\`\`` });
  });
  if (text.trim()) parts.push({ text });
  pendingFiles.filter(f => !f.isText).forEach(f => {
    parts.push({ inlineData: { mimeType: f.mimeType, data: f.data, displayName: f.name } });
  });
  return parts;
}

function clearAttachments() {
  pendingFiles.forEach(f => { if (f.objectUrl) URL.revokeObjectURL(f.objectUrl); });
  pendingFiles = [];
  renderPreviews();
}

function addAttachmentsToBubble(bubble) {
  pendingFiles.forEach(f => {
    if (f.objectUrl) {
      const img = document.createElement('img');
      img.src = f.objectUrl;
      img.alt = f.name;
      bubble.prepend(img);
    } else {
      const chip = document.createElement('div');
      chip.className = 'doc-chip';
      chip.innerHTML = `${f.mimeType === 'application/pdf' ? '📄' : '📝'} ${escapeHtml(f.name)}`;
      bubble.prepend(chip);
    }
  });
}

// ─────────────────────────────────────────────
// Input handling
// ─────────────────────────────────────────────
sendBtn.addEventListener('click', () => sendMessage(inputEl.value));

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(inputEl.value); }
});

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
}
inputEl.addEventListener('input', autoResize);

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
async function checkServer() {
  try {
    const r = await fetch(`${API}/list-apps`);
    if (r.ok) {
      const apps = await r.json();
      setStatus('ready', `Connected · ${apps.length} agent(s) available`);
    } else {
      setStatus('error', 'Server responded with an error');
    }
  } catch (_) {
    setStatus('error', 'Cannot reach server — start server.py first');
  }
}

buildSuggestions();
renderHistory();
checkServer();
</script>
