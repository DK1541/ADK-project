<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADK Agent Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3d;
      --accent:    #6c63ff;
      --accent-lt: #8b85ff;
      --user-bg:   #6c63ff;
      --agent-bg:  #1e2130;
      --text:      #e2e4ed;
      --muted:     #6b7280;
      --danger:    #ef4444;
      --radius:    14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 16px; font-weight: 700; color: #fff;
    }

    header h1 { font-size: 16px; font-weight: 600; flex: 1; }

    .phase-tabs {
      display: flex; gap: 4px;
      background: var(--bg);
      padding: 4px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .phase-tabs button {
      padding: 5px 14px;
      border: none; cursor: pointer;
      border-radius: 7px;
      font-size: 13px; font-weight: 500;
      background: transparent; color: var(--muted);
      transition: all .15s;
    }

    .phase-tabs button.active {
      background: var(--accent);
      color: #fff;
    }

    .new-chat-btn {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent; color: var(--text);
      font-size: 13px; cursor: pointer;
      transition: background .15s;
    }
    .new-chat-btn:hover { background: var(--border); }

    /* ── Phase description bar ── */
    #phase-desc {
      padding: 8px 20px;
      font-size: 12px;
      color: var(--muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Messages ── */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 75%;
      animation: fadeUp .2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg.agent { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: grid; place-items: center;
      font-size: 14px; font-weight: 700;
    }

    .msg.user  .avatar { background: var(--user-bg); color: #fff; }
    .msg.agent .avatar { background: var(--agent-bg); border: 1px solid var(--border); }

    .bubble {
      padding: 11px 15px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user  .bubble {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.agent .bubble {
      background: var(--agent-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .msg.error .bubble {
      background: #2a1515;
      border-color: var(--danger);
      color: #fca5a5;
    }

    /* ── Typing indicator ── */
    .typing .bubble {
      display: flex; gap: 5px; align-items: center;
      padding: 14px 16px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    /* ── Welcome screen ── */
    #welcome {
      margin: auto;
      text-align: center;
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
    }

    #welcome .icon {
      width: 64px; height: 64px;
      background: var(--accent);
      border-radius: 16px;
      display: grid; place-items: center;
      font-size: 28px;
    }

    #welcome h2 { font-size: 22px; font-weight: 600; }
    #welcome p  { color: var(--muted); font-size: 14px; max-width: 340px; line-height: 1.6; }

    .suggestions {
      display: flex; flex-wrap: wrap;
      gap: 8px; justify-content: center;
      margin-top: 8px;
    }

    .suggestion {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px; color: var(--text);
      cursor: pointer; background: var(--surface);
      transition: all .15s;
    }
    .suggestion:hover { border-color: var(--accent); color: var(--accent-lt); }

    /* ── Input bar ── */
    #input-bar {
      padding: 16px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      transition: border-color .15s;
    }
    .input-row:focus-within { border-color: var(--accent); }

    #user-input {
      flex: 1;
      background: transparent; border: none; outline: none;
      color: var(--text); font-size: 14px;
      resize: none; max-height: 140px;
      line-height: 1.5;
      font-family: inherit;
    }

    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: none; cursor: pointer;
      background: var(--accent); color: #fff;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: background .15s, opacity .15s;
    }
    #send-btn:hover   { background: var(--accent-lt); }
    #send-btn:disabled { opacity: .4; cursor: default; }

    #send-btn svg { width: 16px; height: 16px; }

    /* ── Status bar ── */
    #status-bar {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--muted);
      padding: 4px 0 0;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
    }
    .status-dot.ok     { background: #22c55e; }
    .status-dot.error  { background: var(--danger); }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="logo">A</div>
  <h1>ADK Agent Chat</h1>

  <div class="phase-tabs">
    <button class="active" data-phase="1">Phase 1</button>
    <button data-phase="2">Phase 2</button>
    <button data-phase="3">Phase 3</button>
  </div>

  <button class="new-chat-btn" id="new-chat-btn">+ New chat</button>
</header>

<!-- ── Phase description ── -->
<div id="phase-desc">Loading…</div>

<!-- ── Chat messages ── -->
<div id="chat">
  <div id="welcome">
    <div class="icon">🤖</div>
    <h2>Start a conversation</h2>
    <p id="welcome-text">Select a phase above and type a message, or try one of the suggestions below.</p>
    <div class="suggestions" id="suggestions"></div>
  </div>
</div>

<!-- ── Input ── -->
<div id="input-bar">
  <div class="input-row">
    <textarea id="user-input" rows="1" placeholder="Type a message…"></textarea>
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div id="status-bar">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Connecting…</span>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// Config
// ─────────────────────────────────────────────
const API = '';   // empty = same origin (server.py serves this file)
const USER_ID = 'user_' + Math.random().toString(36).slice(2, 8);

const PHASES = {
  1: {
    app: 'phase1_single_agent',
    label: 'Phase 1 — Single Agent',
    desc: 'WeatherBot with weather + time tools. Ask about any supported city.',
    suggestions: [
      'What\'s the weather in Chicago?',
      'What time is it in Tokyo?',
      'Give me weather and time for London.',
    ],
  },
  2: {
    app: 'phase2_stateful',
    label: 'Phase 2 — Stateful Agent',
    desc: 'Remembers your home city and watchlist across the conversation.',
    suggestions: [
      'My home city is Milwaukee.',
      'What\'s the weather at home?',
      'Add Chicago and Tokyo to my watchlist.',
      'Show me my watchlist weather.',
    ],
  },
  3: {
    app: 'phase3_multi_agent',
    label: 'Phase 3 — Multi-Agent',
    desc: 'Coordinator routes to weather, time, and travel specialist agents.',
    suggestions: [
      'What should I pack for Chicago?',
      'Time difference between Milwaukee and Tokyo?',
      'Plan my trip to London.',
      'Everything about Mumbai.',
    ],
  },
};

// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let currentPhase   = 1;
let sessionId      = newSessionId();
let isWaiting      = false;

function newSessionId() {
  return 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
}

// ─────────────────────────────────────────────
// DOM refs
// ─────────────────────────────────────────────
const chatEl      = document.getElementById('chat');
const inputEl     = document.getElementById('user-input');
const sendBtn     = document.getElementById('send-btn');
const statusDot   = document.getElementById('status-dot');
const statusText  = document.getElementById('status-text');
const phaseDesc   = document.getElementById('phase-desc');
const suggestions = document.getElementById('suggestions');
const welcomeText = document.getElementById('welcome-text');
const welcome     = document.getElementById('welcome');

// ─────────────────────────────────────────────
// Phase switching
// ─────────────────────────────────────────────
function switchPhase(phase) {
  currentPhase = phase;
  document.querySelectorAll('.phase-tabs button').forEach(b => {
    b.classList.toggle('active', +b.dataset.phase === phase);
  });

  const p = PHASES[phase];
  phaseDesc.textContent = `${p.label} — ${p.desc}`;
  welcomeText.textContent = p.desc;

  // Rebuild suggestion chips
  suggestions.innerHTML = '';
  p.suggestions.forEach(s => {
    const chip = document.createElement('button');
    chip.className = 'suggestion';
    chip.textContent = s;
    chip.onclick = () => sendMessage(s);
    suggestions.appendChild(chip);
  });

  startNewChat();
}

document.querySelectorAll('.phase-tabs button').forEach(btn => {
  btn.addEventListener('click', () => switchPhase(+btn.dataset.phase));
});

document.getElementById('new-chat-btn').addEventListener('click', startNewChat);

function startNewChat() {
  sessionId = newSessionId();
  chatEl.innerHTML = '';
  chatEl.appendChild(welcome);
  welcome.style.display = 'flex';
  setStatus('ready', 'New session started');
}

// ─────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────
function setStatus(state, text) {
  statusDot.className = 'status-dot ' + (state === 'ready' ? 'ok' : state === 'error' ? 'error' : '');
  statusText.textContent = text;
}

// ─────────────────────────────────────────────
// Message rendering
// ─────────────────────────────────────────────
function addMessage(role, text, extra = '') {
  // Hide welcome screen on first message
  if (welcome.parentNode === chatEl) {
    welcome.style.display = 'none';
  }

  const msg  = document.createElement('div');
  msg.className = `msg ${role}${extra ? ' ' + extra : ''}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? 'U' : '🤖';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chatEl.appendChild(msg);
  chatEl.scrollTop = chatEl.scrollHeight;
  return bubble;
}

function addTyping() {
  if (welcome.parentNode === chatEl) welcome.style.display = 'none';
  const msg = document.createElement('div');
  msg.className = 'msg agent typing';
  msg.id = 'typing-indicator';
  msg.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
  chatEl.appendChild(msg);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping() {
  document.getElementById('typing-indicator')?.remove();
}

// ─────────────────────────────────────────────
// API calls
// ─────────────────────────────────────────────
async function ensureSession() {
  const { app } = PHASES[currentPhase];
  const url = `${API}/apps/${app}/users/${USER_ID}/sessions/${sessionId}`;
  try {
    await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
  } catch (_) { /* session may already exist */ }
}

async function sendMessage(text) {
  if (!text.trim() || isWaiting) return;
  isWaiting = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  autoResize();

  addMessage('user', text);
  addTyping();
  setStatus('', 'Agent is thinking…');

  try {
    await ensureSession();

    const { app } = PHASES[currentPhase];
    const res = await fetch(`${API}/run`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        appName:    app,
        userId:     USER_ID,
        sessionId:  sessionId,
        newMessage: { role: 'user', parts: [{ text }] },
      }),
    });

    removeTyping();

    if (!res.ok) {
      const err = await res.text();
      addMessage('agent', `Error ${res.status}: ${err}`, 'error');
      setStatus('error', `Server error ${res.status}`);
      return;
    }

    const events = await res.json();

    // ADK /run returns an array of events — find the last final response
    let reply = null;
    for (const event of events) {
      if (event?.content?.parts?.length) {
        const text = event.content.parts.map(p => p.text || '').join('').trim();
        if (text) reply = text;
      }
    }

    if (reply) {
      addMessage('agent', reply);
      setStatus('ready', 'Ready');
    } else {
      addMessage('agent', '[No text response — check the server logs]', 'error');
      setStatus('error', 'Empty response');
    }

  } catch (err) {
    removeTyping();
    addMessage('agent', `Could not reach the server.\n\nMake sure server.py is running:\n  python server.py --phase ${currentPhase}`, 'error');
    setStatus('error', 'Cannot connect to server');
  } finally {
    isWaiting = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

// ─────────────────────────────────────────────
// Input handling
// ─────────────────────────────────────────────
sendBtn.addEventListener('click', () => sendMessage(inputEl.value));

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(inputEl.value);
  }
});

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
}
inputEl.addEventListener('input', autoResize);

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
async function checkServer() {
  try {
    const r = await fetch(`${API}/list-apps`);
    if (r.ok) {
      const apps = await r.json();
      setStatus('ready', `Connected · ${apps.length} agent(s) available`);
    } else {
      setStatus('error', 'Server responded with an error');
    }
  } catch (_) {
    setStatus('error', 'Cannot reach server — start server.py first');
  }
}

switchPhase(1);
checkServer();
</script>
</body>
</html>
